<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
</head>

<body>
  <input type="number" id="num1" placeholder="First Number" />
  <input type="number" id="num2" placeholder="Second Number" />
  <button onclick="addNumbers()">Add</button>
  <input type="number" id="result" placeholder="Result" readonly />
  <button id="button" onclick="clearAndAlart()">Clear</button>
</body>

<script>
  function addNumbers() {
    // Get values from the first two boxes
    let val1 = document.getElementById("num1").value;
    let val2 = document.getElementById("num2").value;
    // Convert strings to numbers (using parseFloat for decimals)
    let sum = parseFloat(val1) + parseFloat(val2);
    //  Display the result in the third box
    // Use || 0 to display 0 if inputs are empty
    document.getElementById("result").value = sum || 0;
  }

  function clearAndAlart() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").value = "";
    alert("The input fields have been cleared.");
  }

</script>

</html>
