<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="shortcut icon" href="calculator.jpg" type="image/x-icon">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1 {
      color: #333;
      text-align: center;

    }

    img {
      display: block;
      margin: 0 auto 20px;
      width: 150px;
    }

    input {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <img src="calculator.jpg" alt="Calculator"></img>
  <h1>Simple Calculator</h1>
  <input type="number" id="num1" placeholder="First Number" />
  <input type="number" id="num2" placeholder="Second Number" />
  <button onclick="addNumbers()">Add</button>
  <input type="number" id="result1" placeholder="Result" readonly />
  <button onclick="clearAndAlart2()">Reset</button>
  <br>
  <input type="number" id="num3" placeholder="First Number" />
  <input type="number" id="num4" placeholder="Second Number" />
  <button onclick="subNumbers()">Difference</button>
  <input type="number" id="result2" placeholder="Result" readonly />
  <button onclick="clearAndAlart3()">Reset</button>
  <br>
  <input type="number" id="num5" placeholder="First Number" />
  <input type="number" id="num6" placeholder="Second Number" />
  <button onclick="mulNumbers()">Multiply</button>
  <input type="number" id="result3" placeholder="Result" readonly />
  <button onclick="clearAndAlart4()">Reset</button>
  <br>
  <input type="number" id="num7" placeholder="First Number" />
  <input type="number" id="num8" placeholder="Second Number" />
  <button onclick="mulNumbers()">Division</button>
  <input type="number" id="result4" placeholder="Result" readonly />
  <button onclick="clearAndAlart5()">Reset</button>
</body>

<script>
  function clearAndAlart1() {
    document.getElementById("button").value = "";
    alert("The input field has been cleared.");
  }
  function clearAndAlart2() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result1").value = "";
    // alert("The input field has been cleared.");
  }
  function clearAndAlart3() {
    document.getElementById("num3").value = "";
    document.getElementById("num4").value = "";
    document.getElementById("result2").value = "";
    // alert("The input field has been cleared.");
  }
  function clearAndAlart4() {
    document.getElementById("num5").value = "";
    document.getElementById("num6").value = "";
    document.getElementById("result3").value = "";
    // alert("The input field has been cleared.");
  }
  function clearAndAlart5() {
    document.getElementById("num7").value = "";
    document.getElementById("num8").value = "";
    document.getElementById("result4").value = "";
    // alert("The input field has been cleared.");
  }

  function addNumbers() {
    // Get values from the first two boxes
    let val1 = document.getElementById("num1").value;
    let val2 = document.getElementById("num2").value;
    // Convert strings to numbers (using parseFloat for decimals)
    let sum = parseFloat(val1) + parseFloat(val2);
    //  Display the result in the third box
    // Use || 0 to display 0 if inputs are empty
    document.getElementById("result1").value = sum || 0;
  }

  function subNumbers() {
    // Get values from the first two boxes
    let val1 = document.getElementById("num3").value;
    let val2 = document.getElementById("num4").value;
    // Convert strings to numbers (using parseFloat for decimals)
    let difference = parseFloat(val1) - parseFloat(val2);
    //  Display the result in the third box
    // Use || 0 to display 0 if inputs are empty
    document.getElementById("result2").value = difference || 0;
  }
  function mulNumbers() {
    // Get values from the first two boxes
    let val1 = document.getElementById("num5").value;
    let val2 = document.getElementById("num6").value;
    // Convert strings to numbers (using parseFloat for decimals)
    let product = parseFloat(val1) * parseFloat(val2);
    //  Display the result in the third box
    // Use || 0 to display 0 if inputs are empty
    document.getElementById("result3").value = product || 0;
  }
  function divNumbers() {
    // Get values from the first two boxes
    let val1 = document.getElementById("num7").value;
    let val2 = document.getElementById("num8").value;
    // Convert strings to numbers (using parseFloat for decimals)
    let division = parseFloat(val1) / parseFloat(val2);
    //  Display the result in the third box
    // Use || 0 to display 0 if inputs are empty
    document.getElementById("result4").value = division || 0;
  }

</script>

</html>
