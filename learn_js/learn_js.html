<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Tutorial</title>
</head>

<body>


    <script>

        // This is a simple JavaScript code snippet
        console.log("Hello, World!");

        console.log("Welcome to learning JavaScript.");

        // Performing basic arithmetic operations
        console.log(55 + 66);

        // Subtraction
        console.log(440 - 40);

        // Multiplication
        console.log(12 * 12);

        // Division
        console.log(17 / 5);

        // Modulus operator gives the remainder of the division
        console.log(17 % 5);

        // Using document.write to display output on the webpage
        document.write("This is a simple JavaScript code snippet.");
        document.write("<br>");
        document.write("The sum of 55 and 66 is: " + (55 + 66));
        document.write("<br>");
        document.write("JavaScript is a versatile programming language.");

        // Using alert to show a popup message
        alert("Welcome to learning JavaScript!");

        // Using prompt to get user input
        let x = prompt("Please enter your name:");
        document.write("<br>");
        document.write("Hello, " + x + "!");

        // Using variables to store values
        var a = 10;
        var b = 20;
        var sum = a + b;
        document.write("<br>");
        document.write("The sum of " + a + " and " + b + " is: " + sum);

        // Converting days to years, months, and days
        document.write("<br>");
        let days = prompt("Please enter the number of days:", "0");
        let years = parseInt(days / 365);
        let months = parseInt(days % 365 / 30);
        let daysRemaining = days % 365 % 30;
        document.write("Years: " + years + ", Months: " + months + ", Days: " + daysRemaining);
        document.write("<br>");

        function addNumbers() {
            // Get values from the first two boxes
            let val1 = document.getElementById("num1").value;
            let val2 = document.getElementById("num2").value;
            // Convert strings to numbers (using parseFloat for decimals)
            let sum = parseFloat(val1) + parseFloat(val2);
            //  Display the result in the third box
            // Use || 0 to display 0 if inputs are empty
            document.getElementById("result1").value = sum || 0;
        }

        function clearAndAlert() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("result1").value = "";
            // alert("The input field has been cleared.");
        }

    </script>

    <h1>Simple Calculator</h1>
    <input type="number" id="num1" placeholder="First Number" />
    <input type="number" id="num2" placeholder="Second Number" />
    <button onclick="addNumbers()">Add</button>
    <input type="number" id="result1" placeholder="Result" readonly />
    <button onclick="clearAndAlert()">Reset</button>
    <br>
</body>
