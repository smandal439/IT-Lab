<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server-Side Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .calculate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .calculate-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .reset-btn {
            background: #f0f0f0;
            color: #333;
        }

        .reset-btn:hover {
            background: #e0e0e0;
        }

        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .error {
            color: #e74c3c;
            padding: 12px;
            background: #fadbd8;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 15px;
            display: none;
        }

        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1>Calculator</h1>
        
        <div class="error" id="errorMessage"></div>
        
        <form id="calculatorForm">
            <div class="form-group">
                <label for="firstNumber">First Number:</label>
                <input type="number" id="firstNumber" name="firstNumber" step="any" required>
            </div>

            <div class="form-group">
                <label for="operation">Operation:</label>
                <select id="operation" name="operation" required>
                    <option value="">-- Select Operation --</option>
                    <option value="add">Addition (+)</option>
                    <option value="subtract">Subtraction (-)</option>
                    <option value="multiply">Multiplication (×)</option>
                    <option value="divide">Division (÷)</option>
                    <option value="modulo">Modulo (%)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="secondNumber">Second Number:</label>
                <input type="number" id="secondNumber" name="secondNumber" step="any" required>
            </div>

            <div class="button-group">
                <button type="submit" class="calculate-btn">Calculate</button>
                <button type="reset" class="reset-btn">Clear</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <p>Calculating...</p>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-label">Result:</div>
            <div class="result-value" id="resultValue">0</div>
        </div>
    </div>

    <script>
        const form = document.getElementById('calculatorForm');
        const errorMessage = document.getElementById('errorMessage');
        const resultContainer = document.getElementById('resultContainer');
        const resultValue = document.getElementById('resultValue');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset error and result
            errorMessage.classList.remove('show');
            resultContainer.classList.remove('show');
            
            // Get form values
            const firstNumber = document.getElementById('firstNumber').value;
            const secondNumber = document.getElementById('secondNumber').value;
            const operation = document.getElementById('operation').value;

            // Validation
            if (!operation) {
                showError('Please select an operation');
                return;
            }

            // Show loading
            loading.classList.add('show');

            try {
                // Send data to server
                const response = await fetch('calculator.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `firstNumber=${encodeURIComponent(firstNumber)}&secondNumber=${encodeURIComponent(secondNumber)}&operation=${encodeURIComponent(operation)}`
                });

                const data = await response.json();

                if (data.success) {
                    resultValue.textContent = data.result;
                    resultContainer.classList.add('show');
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError('Error communicating with server: ' + error.message);
            } finally {
                loading.classList.remove('show');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Clear form on reset button
        form.addEventListener('reset', () => {
            errorMessage.classList.remove('show');
            resultContainer.classList.remove('show');
        });
    </script>
</body>
</html>
